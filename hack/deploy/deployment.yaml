apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectc-wallet
  labels:
    app: projectc-wallet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projectc-wallet
  template:
    metadata:
      labels:
        app: projectc-wallet
    spec:
      containers:
        - name: projectc-wallet
          image: REPLACE_IMAGE
          ports:
            - containerPort: 8081
